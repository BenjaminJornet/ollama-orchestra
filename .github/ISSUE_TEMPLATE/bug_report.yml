name: Bug report
description: Report an Ollama concurrency, embedding, or reasoning helper issue.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: Describe the workload and endpoints involved.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
