name: Install from PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "10 8 * * 1"

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install published package
        run: python -m pip install ollama-orchestra
      - name: Import and smoke published package
        run: |
          python - <<'PY'
          from ollama_orchestra import OllamaSemaphorePool, RoundRobinOllama, strip_reasoning
          pool = OllamaSemaphorePool()
          assert pool.is_local_ollama_url("http://localhost:11434")
          rr = RoundRobinOllama(["a", "b"])
          assert rr.parallelism == 2
          assert strip_reasoning("<think>x</think>ok") == "ok"
          print("published package import ok")
          PY
